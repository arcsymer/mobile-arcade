<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>mobile-arcade — one-thumb games by @arcsymer</title>
<style>
  :root { --bg:#0d0a1a; --card:#171331; --ink:#eef0ff; --muted:#9aa2c8; --accn:#5ad1ff; }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif; -webkit-text-size-adjust: 100%; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 18px 60px; }
  header { text-align: center; padding: 18px 0 8px; }
  h1 { font-size: clamp(30px, 8vw, 52px); margin: 0; letter-spacing: -.5px;
    background: linear-gradient(90deg,#7aa2ff,#5ad1ff,#b98cff); -webkit-background-clip: text;
    background-clip: text; color: transparent; }
  .sub { color: var(--muted); font-size: clamp(14px,2.6vw,17px); line-height:1.55; margin-top: 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 16px; margin-top: 26px; }
  .card { background: var(--card); border: 1px solid rgba(255,255,255,.09); border-radius: 16px;
    overflow: hidden; display: flex; flex-direction: column; }
  .thumb { aspect-ratio: 9/16; background:#0d0a1a center/cover no-repeat; display:flex;
    align-items:center; justify-content:center; color:var(--muted); font-size:13px; }
  .body { padding: 14px 15px 16px; flex: 1; display: flex; flex-direction: column; }
  .name { font-weight: 800; font-size: 19px; }
  .tag { color: var(--accn); font-size: 12.5px; margin: 3px 0 8px; letter-spacing:.02em; }
  .desc { color: var(--muted); font-size: 13.5px; line-height: 1.5; flex: 1; }
  .btn { display: inline-block; margin-top: 12px; text-align: center; text-decoration: none;
    font-weight: 700; font-size: 14px; padding: 10px 14px; border-radius: 999px; }
  .play { background: linear-gradient(90deg,#4aa8ff,#5ad1ff); color: #04121f; }
  .soon { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid rgba(255,255,255,.1); }
  footer { text-align: center; color: var(--muted); font-size: 13px; margin-top: 34px; line-height: 1.7; }
  footer a { color: var(--accn); text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>mobile-arcade</h1>
    <p class="sub">Small, original <b>one-thumb time-killers</b> built in Unity, playable right in the browser.<br>
      Best on a phone — portrait, tap/hold to play.</p>
  </header>
  <div class="grid" id="grid"></div>
  <footer>
    Original hyper-casual prototypes — original art &amp; audio, all generated procedurally.<br>
    built by <a href="https://github.com/arcsymer">@arcsymer</a> ·
    <a href="https://github.com/arcsymer/mobile-arcade">source on GitHub</a>
  </footer>
</div>
<script>
  var games = [
    { slug:"stardodge", name:"STARDODGE", tag:"dodge · endless", live:true,
      desc:"Weave a glowing craft through falling meteors. The longer you last, the faster they come. Hold anywhere to steer." },
    { slug:"stak", name:"STAK", tag:"tap-timing · stacker", live:true,
      desc:"Tap to drop each block onto the tower — the overhang gets sliced off, so line them up. Stack as high as you can." },
    { slug:"gobble", name:"GOBBLE", tag:"grow · eat-'em-up", live:true,
      desc:"Drag your blob to eat smaller blobs and grow — dodge the bigger ones. The more you eat, the more you can eat." },
    { slug:"game4", name:"Coming soon", tag:"reflex · whack", live:false,
      desc:"React fast — hit the right targets before they vanish." },
  ];
  var grid = document.getElementById("grid");
  games.forEach(function (g) {
    var el = document.createElement("div"); el.className = "card";
    var thumbStyle = g.live ? ' style="background-image:url(media/' + g.slug + '.gif)"' : '';
    var thumbText = g.live ? '' : 'coming soon';
    var action = g.live
      ? '<a class="btn play" href="web/' + g.slug + '/">▶ play</a>'
      : '<span class="btn soon">soon</span>';
    el.innerHTML = '<div class="thumb"' + thumbStyle + '>' + thumbText + '</div>' +
      '<div class="body"><div class="name">' + g.name + '</div>' +
      '<div class="tag">' + g.tag + '</div>' +
      '<div class="desc">' + g.desc + '</div>' + action + '</div>';
    grid.appendChild(el);
  });
</script>
</body>
</html>
